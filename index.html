<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Freecash x TikTok</title>
  <link rel="icon" href="data:," />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #030704;
      --card: #0b1710;
      --card2: #101f16;
      --green: #39ff88;
      --green2: #19c762;
      --text: #f5fff7;
      --muted: #a7b8ab;
      --yellow: #ffd56a;
      --red: #ff5c6c;
      --line: rgba(255,255,255,.10);
      --shadow: 0 24px 70px rgba(0,0,0,.55);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 50% -10%, rgba(57,255,136,.35), transparent 35%),
        radial-gradient(circle at 100% 25%, rgba(255,213,106,.16), transparent 28%),
        linear-gradient(180deg, #06140b 0%, #030704 65%, #020302 100%);
      overflow-x: hidden;
    }

    body.lock {
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .device-gate {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at top, rgba(57,255,136,.34), transparent 38%),
        rgba(2,5,3,.98);
    }

    .device-box {
      width: 100%;
      max-width: 390px;
      padding: 30px 20px 22px;
      text-align: center;
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(20,38,27,.96), rgba(6,12,8,.98));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
    }

    .device-badge {
      width: fit-content;
      margin: 0 auto 18px;
      padding: 9px 13px;
      border-radius: 999px;
      color: #baffd0;
      background: rgba(57,255,136,.12);
      border: 1px solid rgba(57,255,136,.30);
      font-size: 12px;
      font-weight: 1000;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .device-box h2 {
      font-size: clamp(36px, 11vw, 48px);
      line-height: .95;
      letter-spacing: -.06em;
      margin-bottom: 12px;
    }

    .device-box > p {
      max-width: 300px;
      margin: 0 auto 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .device-actions {
      display: grid;
      gap: 12px;
    }

    .device-button {
      width: 100%;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      color: #f5fff7;
      background: rgba(255,255,255,.06);
      cursor: pointer;
      text-align: left;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .device-button:hover,
    .device-button:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(57,255,136,.55);
      background: rgba(57,255,136,.10);
      outline: none;
    }

    .device-icon {
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      color: #031108;
      background: linear-gradient(180deg, #67ffa3, #20d66b);
      font-size: 24px;
      font-weight: 1000;
      box-shadow: 0 12px 28px rgba(32,214,107,.20);
    }

    .device-icon svg,
    .chip-device-icon {
      width: 24px;
      height: 24px;
      display: block;
      fill: currentColor;
      flex: 0 0 auto;
    }

    .chip-device-icon {
      width: 17px;
      height: 17px;
    }

    .device-button strong {
      display: block;
      font-size: 17px;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .device-button small {
      display: block;
      color: #aebfb2;
      font-size: 12px;
      font-weight: 700;
    }

    .device-note {
      margin-top: 16px;
      color: #718477;
      font-size: 11px;
      line-height: 1.45;
    }

    #appRoot {
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 14px 112px;
    }

    .top {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 18px;
      padding-top: 4px;
    }

    .brand-combo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 12px 34px rgba(0,0,0,.28);
    }

    .brand-combo img {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      object-fit: cover;
      background: rgba(255,255,255,.08);
    }

    .brand-combo span {
      color: var(--green);
      font-size: 18px;
      font-weight: 1000;
      line-height: 1;
    }

    .hero {
      min-height: 72vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4px 0 20px;
    }

    .payout-badge {
      width: fit-content;
      margin: 0 auto 24px;
      padding: 10px 15px;
      border-radius: 999px;
      color: #baffd0;
      background: rgba(57,255,136,.12);
      border: 1px solid rgba(57,255,136,.34);
      box-shadow: inset 0 0 20px rgba(57,255,136,.05);
      font-size: 14px;
      font-weight: 1000;
    }

    h1 {
      text-align: center;
      font-size: clamp(38px, 12vw, 54px);
      line-height: .98;
      letter-spacing: -.065em;
      font-weight: 1000;
      margin-bottom: 18px;
    }

    h1 span {
      color: var(--green);
      text-shadow: 0 0 30px rgba(57,255,136,.25);
    }

    .mini-text {
      max-width: 335px;
      margin: 0 auto 22px;
      text-align: center;
      color: #dbe6de;
      font-size: 17px;
      line-height: 1.45;
      font-weight: 750;
    }

    .chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 0 auto 26px;
      max-width: 350px;
    }

    .chip {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      color: #f4fff7;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
    }

    .section-title {
      margin: 22px 0 12px;
      color: #eee9f6;
      font-size: 13px;
      font-weight: 1000;
      letter-spacing: .24em;
      text-transform: uppercase;
    }

    .offer-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 112px;
      padding: 16px;
      border-radius: 28px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.11);
      box-shadow: 0 18px 48px rgba(0,0,0,.32);
    }

    .play {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      background: rgba(57,255,136,.12);
      border: 4px solid var(--green);
      color: #fff;
      font-size: 20px;
      box-shadow: 0 0 25px rgba(57,255,136,.26);
    }

    .offer-card strong {
      display: block;
      max-width: 205px;
      margin-bottom: 4px;
      font-size: 18px;
      line-height: 1.12;
      letter-spacing: -.03em;
    }

    .offer-card span {
      color: #dbcfe0;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 760;
    }

    .hot {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 7px 11px;
      border-radius: 999px;
      background: var(--yellow);
      color: #3a2500;
      font-size: 11px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .rating {
      position: absolute;
      right: 20px;
      bottom: 17px;
      color: #fff;
      font-size: 13px;
      font-weight: 1000;
    }

    .rating i {
      color: var(--yellow);
      font-style: normal;
    }

    .tip-card {
      margin: 4px 0 20px;
      padding: 24px 22px 19px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025)),
        radial-gradient(circle at top left, rgba(57,255,136,.12), transparent 34%);
      border: 1px solid rgba(156,255,188,.22);
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(0,0,0,.30);
    }

    .tip-label {
      color: var(--yellow);
      font-size: 14px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: -.02em;
      margin-bottom: 18px;
    }

    .tip-card h2 {
      font-size: 29px;
      line-height: 1.08;
      letter-spacing: -.055em;
      margin-bottom: 15px;
    }

    .tip-card h2 span {
      color: var(--yellow);
    }

    .tip-card p {
      color: #eadff0;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 760;
      margin-bottom: 18px;
    }

    .rainbow {
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, #39ff88, #e8ff3f, #ffbb38, #ff6b4a);
      box-shadow: 0 0 20px rgba(57,255,136,.22);
    }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .mini-step {
      min-height: 180px;
      padding: 18px 10px 12px;
      border-radius: 18px;
      text-align: center;
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.10);
    }

    .mini-step .big {
      display: block;
      color: var(--green);
      font-size: 34px;
      line-height: 1;
      font-weight: 1000;
      margin-bottom: 10px;
    }

    .mini-step .icon {
      display: block;
      color: var(--green);
      font-size: 32px;
      line-height: 1;
      margin-bottom: 16px;
    }

    .mini-step strong {
      display: block;
      color: #fff;
      font-size: 15px;
      line-height: 1.12;
      letter-spacing: -.035em;
      margin-bottom: 10px;
    }

    .mini-step p {
      color: #b8c7bd;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 700;
    }

    .cashout {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .cashout span {
      padding: 9px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: #d7e7db;
      font-size: 12px;
      font-weight: 850;
    }

    .note {
      margin-top: 12px;
      color: #8fa596;
      text-align: center;
      font-size: 11px;
      line-height: 1.45;
    }

    .sticky {
      position: fixed;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(430px, calc(100% - 24px));
      z-index: 20;
      padding: 10px;
      border-radius: 26px;
      background: rgba(3,7,4,.78);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 55px rgba(0,0,0,.55);
    }

    .cta {
      min-height: 64px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #031108;
      background: linear-gradient(180deg, #67ffa3, #20d66b);
      box-shadow: 0 16px 34px rgba(32,214,107,.28);
      font-weight: 1000;
      font-size: 18px;
      letter-spacing: -.035em;
      text-align: center;
    }

    .cta small {
      display: block;
      font-size: 11px;
      font-weight: 850;
      opacity: .72;
      margin-top: 2px;
      letter-spacing: 0;
    }

    footer {
      padding: 28px 0 8px;
      text-align: center;
      color: #718477;
      font-size: 11px;
      line-height: 1.6;
    }

    footer a {
      margin: 0 7px;
      color: #7f9686;
    }

    @media (max-width: 370px) {
      .chips {
        grid-template-columns: 1fr;
      }

      .steps-grid {
        grid-template-columns: 1fr;
      }

      .mini-step {
        min-height: auto;
      }
    }
  </style>
</head>

<body>

  <div id="appRoot"></div>

  <template id="mainPageTemplate">
<main class="page">

    <header class="top">
      <div class="brand-combo">
        <img src="assets/freecash-logo.webp" alt="Freecash">
        <span>×</span>
        <img src="assets/tiktok-logo.webp" alt="TikTok">
      </div>
    </header>

    <section class="hero">
      <div class="payout-badge">✓ €50,000,000+ already paid out</div>

      <h1>
        Get paid to <span>scroll on TikTok</span>
      </h1>

      <p class="mini-text">
        Turn your screen time into real rewards with Freecash.
      </p>

      <div class="tip-card">
        <div class="tip-label">⚡ Pro tip</div>
        <h2>Unlock <span>higher payouts</span></h2>
        <p>Complete 2 to 3 starter offers to access better rewards and earn even more.</p>
        <div class="rainbow"></div>
      </div>

      <div class="chips">
        <div class="chip" id="deviceChip">📱 Your device</div>
        <div class="chip">⚡ Fast payout</div>
        <div class="chip">🔒 Secure account</div>
        <div class="chip">🎁 Daily bonuses</div>
        <div class="chip">📱 TikTok scroll</div>
      </div>

      <div class="section-title">Recommended offer</div>

      <div class="offer-card">
        <div class="play">▶</div>
        <div>
          <strong>Earn while scrolling</strong>
          <span>Get rewarded for discovering offers and simple tasks.</span>
        </div>
        <div class="hot">Hot offer</div>
        <div class="rating"><i>★</i> 5.0</div>
      </div>

    </section>

    <div class="section-title">How it works</div>

    <section class="steps-grid">
      <div class="mini-step">
        <span class="big">1</span>
        <span class="icon">＋</span>
        <strong>Choose an offer</strong>
        <p>Select an available task in your dashboard.</p>
      </div>

      <div class="mini-step">
        <span class="big">2</span>
        <span class="icon">✓</span>
        <strong>Complete the tasks</strong>
        <p>Unlock better payouts after the first offers.</p>
      </div>

      <div class="mini-step">
        <span class="big">3</span>
        <span class="icon">$</span>
        <strong>Get your cash</strong>
        <p>Withdraw your rewards quickly based on the available options.</p>
      </div>
    </section>

    <div class="cashout">
      <span>PayPal</span>
      <span>Crypto</span>
      <span>Gift cards</span>
    </div>

    <p class="note">
      Rewards are not guaranteed and may vary depending on the offer, user, and availability.
    </p>

    <footer>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Disclaimer</a><br>
      © 2026
    </footer>

  </main>

  <div class="sticky">
    <a
      class="cta"
      href="https://raintrkr.com/r/eyJ0IjoiZnJlZWNhc2gtY3BpIiwidGlkIjoiNDM1YWY5Y2Y2OGRlZGU5Y2EyNWMiLCJ0cyI6MTc4MzY4NTYwMjI5N30?s1=snus&feb=1"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span>
        Sign up & receive an €8 bonus →
        <small>Scroll on TikTok and earn rewards</small>
      </span>
    </a>
  </div>
  </template>

  <script>
    const appRoot = document.getElementById("appRoot");
    const mainPageTemplate = document.getElementById("mainPageTemplate");

    function detectDevice() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      return /iPad|iPhone|iPod/i.test(userAgent) ? "ios" : "android";
    }

    function appendTrackingParameters(selectedDevice) {
      const currentParams = new URLSearchParams(window.location.search);

      document.querySelectorAll("#appRoot a[href^='http']").forEach(function (link) {
        const url = new URL(link.href);

        currentParams.forEach(function (value, key) {
          if (!url.searchParams.has(key)) {
            url.searchParams.set(key, value);
          }
        });

        url.searchParams.set("device", selectedDevice);
        link.href = url.toString();
      });
    }

    function loadMainPage() {
      const selectedDevice = detectDevice();

      appRoot.appendChild(mainPageTemplate.content.cloneNode(true));

      const deviceChip = document.getElementById("deviceChip");
      if (deviceChip) {
        if (selectedDevice === "ios") {
          deviceChip.innerHTML = `
            <svg class="chip-device-icon" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
              <path d="M42.8 33.7c-.1-7 5.7-10.4 6-10.6-3.3-4.8-8.4-5.5-10.2-5.6-4.3-.4-8.4 2.6-10.6 2.6-2.3 0-5.7-2.6-9.4-2.5-4.8.1-9.3 2.8-11.8 7.1-5.1 8.8-1.3 21.8 3.6 28.9 2.4 3.5 5.3 7.4 9.1 7.2 3.7-.1 5.1-2.3 9.5-2.3 4.4 0 5.7 2.3 9.5 2.2 3.9-.1 6.4-3.5 8.8-7 2.8-4 3.9-7.9 4-8.1-.1 0-8.4-3.2-8.5-11.9Z"/>
              <path d="M35.8 12.9c2-2.4 3.4-5.8 3-9.2-2.9.1-6.5 2-8.6 4.4-1.9 2.1-3.5 5.6-3.1 8.9 3.3.2 6.7-1.6 8.7-4.1Z"/>
            </svg>
            <span>iPhone / iOS</span>`;
        } else {
          deviceChip.innerHTML = '<span aria-hidden="true">🤖</span><span>Android</span>';
        }
      }

      appendTrackingParameters(selectedDevice);
      window.scrollTo(0, 0);
    }

    loadMainPage();
  </script>

</body>
</html>
